<!DOCTYPE html>
<html>
<head>
<style>
* { margin: 0; padding: 0; }
body { background: transparent; overflow: hidden; }
#dot, #ring {
  position: fixed;
  border-radius: 50%;
  pointer-events: none;
  transform: translate(-50%, -50%);
}
#dot { width: 10px; height: 10px; background: #FFF9E3; }
#ring { width: 24px; height: 24px; border: 1.5px solid rgba(255,249,227,0.5); transition: all .2s ease; }
#ring.hov { width: 40px; height: 40px; border-color: #C1521D; background: rgba(193,82,29,0.08); }
</style>
</head>
<body>
<div id="dot"></div>
<div id="ring"></div>
<script>
var dot = document.getElementById('dot');
var ring = document.getElementById('ring');
var mx=0,my=0,rx=0,ry=0;
var win = window.parent;
win.document.documentElement.style.cursor = 'none';
win.addEventListener('mousemove',function(e){
  mx=e.clientX; my=e.clientY;
  dot.style.left=mx+'px'; dot.style.top=my+'px';
});
win.document.addEventListener('mouseover',function(e){
  if(e.target.closest('a,button')) ring.classList.add('hov');
});
win.document.addEventListener('mouseout',function(e){
  if(e.target.closest('a,button')) ring.classList.remove('hov');
});
(function loop(){
  rx+=(mx-rx)*.1; ry+=(my-ry)*.1;
  ring.style.left=rx+'px'; ring.style.top=ry+'px';
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
